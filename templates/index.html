<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Irrigation - DHT11</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- TÍTULO -->
    <h1 class="text-center mb-4">
        🌱 Sistema Inteligente de Riego - DHT11
    </h1>

    <!-- GRÁFICA -->
    <canvas id="grafica" height="100"></canvas>

    <!-- RESULTADO MACHINE LEARNING -->
    <div class="text-center mt-5 p-4 bg-white shadow rounded">
        <h2>🧠 Decisión del sistema</h2>
        <h3 id="decision" class="mt-3">Cargando...</h3>
    </div>

</div>

<script>

window.onload = async () => {

    // =========================
    // 📊 DATOS PARA GRÁFICA
    // =========================
    const respuesta = await fetch('/datos');
    const datos = await respuesta.json();

    const labels = datos.map(d => d.fecha);
    const temperaturas = datos.map(d => d.temperatura);
    const humedades = datos.map(d => d.humedad);

    const ctx = document.getElementById('grafica').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Temperatura (°C)',
                    data: temperaturas,
                    yAxisID: 'y',
                    borderColor: 'red',
                    borderWidth: 2,
                    tension: 0.3
                },
                {
                    label: 'Humedad (%)',
                    data: humedades,
                    yAxisID: 'y1',
                    borderColor: 'blue',
                    borderWidth: 2,
                    tension: 0.3
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'top' },
                title: {
                    display: true,
                    text: 'Mediciones del Cultivo'
                }
            },
            scales: {
                y: {
                    type: 'linear',
                    position: 'left'
                },
                y1: {
                    type: 'linear',
                    position: 'right',
                    grid: { drawOnChartArea: false }
                }
            }
        }
    });

    // =========================
    // 🧠 MACHINE LEARNING
    // =========================
    async function prediccion() {
        const res = await fetch('/predict');
        const data = await res.json();

        const decision = document.getElementById("decision");

        if (data.regar === 1) {
            decision.innerHTML = "💧 <span class='text-danger'>REGAR AHORA</span>";
        } else {
            decision.innerHTML = "🌱 <span class='text-success'>NO ES NECESARIO REGAR</span>";
        }
    }

    // actualizar cada 5 segundos
    setInterval(prediccion, 5000);
    prediccion();
};

</script>

</body>
</html>
